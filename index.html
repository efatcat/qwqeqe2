<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kolblocks | Летнее обновление</title>
    <!-- Подключаем шрифт Unbounded -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Полное перекрытие экрана, запрет прокрутки */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;   /* убираем прокрутку полностью */
            font-family: 'Unbounded', cursive, sans-serif;
            background: #00A86B;
        }

        /* Главный контейнер — на весь экран, флекс-центрирование */
        .green-page {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0F8B4A 0%, #1DB954 50%, #00C853 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            overflow: hidden;
        }

        /* Легкий декоративный эффект (не влияет на контент) */
        .green-page::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 40%, rgba(255,255,200,0.12) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Контентный блок */
        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            width: 100%;
            animation: fadeSlideUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        /* Основной текст анонса — уменьшенный размер, чтобы гарантированно помещаться */
        .main-text {
            font-size: clamp(1.4rem, 6vw, 2.8rem);
            font-weight: 800;
            color: #FFFFFF;
            text-shadow: 0 2px 15px rgba(0, 32, 0, 0.4);
            letter-spacing: -0.01em;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Стильная дата */
        .highlight-date {
            background: rgba(255, 215, 120, 0.25);
            backdrop-filter: blur(3px);
            display: inline-block;
            padding: 0.1rem 1rem;
            border-radius: 80px;
            font-weight: 800;
            color: #FFFAE6;
            border: 1px solid rgba(255,245,180,0.7);
            margin: 0 0.2rem;
            white-space: nowrap;
        }

        /* Убираем дополнительный подзаголовок (надпись про новые механики) — полностью удалён */
        /* Кнопка с отступом компактнее */
        .hub-button {
            margin-top: 2.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0A2F1F;
            border: none;
            cursor: pointer;
            font-family: 'Unbounded', cursive, sans-serif;
            font-weight: 600;
            font-size: clamp(0.85rem, 3.8vw, 1.1rem);
            padding: 0.85rem 2rem;
            border-radius: 60px;
            color: white;
            background: linear-gradient(105deg, #1E4D2E 0%, #0F3C22 100%);
            box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,200,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            letter-spacing: 0.5px;
            border: 1px solid rgba(210, 255, 150, 0.5);
        }

        .hub-button:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #2D6A3E 0%, #185C30 100%);
            box-shadow: 0 18px 28px -10px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 235, 130, 0.8);
        }

        .hub-button:active {
            transform: translateY(2px);
            box-shadow: 0 8px 15px -5px rgba(0, 0, 0, 0.3);
        }

        .button-icon {
            margin-right: 10px;
            font-size: 1.2rem;
            display: inline-block;
            transition: transform 0.2s;
        }

        .hub-button:hover .button-icon {
            transform: translateX(-4px);
        }

        /* Адаптация под очень маленькие экраны — текст гарантированно влезает */
        @media (max-width: 550px) {
            .green-page {
                padding: 1rem;
            }
            .main-text {
                font-size: 1.3rem;
                line-height: 1.35;
            }
            .hub-button {
                padding: 0.7rem 1.5rem;
                margin-top: 2rem;
            }
            .highlight-date {
                white-space: normal;
                display: inline-block;
                padding: 0.1rem 0.8rem;
            }
        }

        /* Для узких экранов, но высоких — сохраняем читаемость */
        @media (max-height: 500px) {
            .hub-button {
                margin-top: 1.3rem;
                padding: 0.6rem 1.5rem;
            }
            .main-text {
                font-size: 1.2rem;
            }
        }

        /* Анимация */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Скрываем скроллбары везде */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="green-page">
        <div class="content">
            <!-- Только главное сообщение, без дополнительной строки про механики -->
            <div class="main-text">
                Летнее обновление<br>
                Kolblocks выходит уже<br>
                <span class="highlight-date">1 июня</span>
            </div>
            <!-- Кнопка "Вернуться в хаб" -->
            <div>
                <button class="hub-button" id="backToHubBtn">
                    <span class="button-icon">⬢</span> Вернуться в хаб
                </button>
            </div>
        </div>
    </div>

    <script>
        // Обработчик кнопки: переход на страницу хаба
        const button = document.getElementById('backToHubBtn');
        if (button) {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'https://efatcat.github.io/kolblocks';
            });
        }

        // Полное отключение любых попыток прокрутки (колёсико, тач-свайпы, клавиши)
        function preventScroll(e) {
            e.preventDefault();
            return false;
        }

        // Блокируем прокрутку колесиком мыши
        window.addEventListener('wheel', preventScroll, { passive: false });
        // Блокируем touchmove (свайпы на телефонах)
        window.addEventListener('touchmove', preventScroll, { passive: false });
        
        // Блокируем клавиши навигации, которые вызывают скролл
        window.addEventListener('keydown', function(e) {
            const scrollKeys = ['ArrowUp', 'ArrowDown', 'PageUp', 'PageDown', 'Home', 'End', ' ', 'Space'];
            if (scrollKeys.includes(e.key) || e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
            }
        });
        
        // Дополнительно: отключаем возможность скролла через touch-action у основного контейнера
        const greenPage = document.querySelector('.green-page');
        if (greenPage) {
            greenPage.style.touchAction = 'none';
        }
        
        // Также фикс: предотвращаем скролл при перетаскивании выделения на мобильных (редкий кейс)
        document.body.style.overflow = 'hidden';
    </script>
</body>
</html>
